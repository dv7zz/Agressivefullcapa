<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Otimização Elite</title>
    
    <style>
        /* RESET E PERFORMANCE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        :root {
            --red: #ff0000;
            --bg: #050505;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* PAINEL CENTRAL */
        .panel {
            width: 90%;
            max-width: 360px;
            background: rgba(15, 15, 15, 0.98);
            border: 1px solid var(--red);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.15);
        }

        h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        /* ANIMAÇÃO DE CARGA */
        .loading-box {
            margin: 25px 0;
        }

        .percent {
            font-size: 3rem;
            font-weight: 900;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 0 10px var(--red);
        }

        .bar-container {
            width: 100%;
            height: 6px;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
        }

        .bar-fill {
            width: 0%;
            height: 100%;
            background: var(--red);
            box-shadow: 0 0 15px var(--red);
            transition: width 0.1s linear;
        }

        /* INFO BOX */
        .info {
            text-align: left;
            font-size: 0.75rem;
            color: #777;
            margin-top: 20px;
            line-height: 1.8;
            border-top: 1px solid #222;
            padding-top: 15px;
        }

        .info span { color: var(--red); font-weight: bold; }
    </style>
</head>
<body>

    <div class="panel">
        <h1 id="title">Login do Sistema</h1>
        
        <div class="loading-box">
            <div class="percent" id="pct">0%</div>
            <div class="bar-container">
                <div class="bar-fill" id="fill"></div>
            </div>
        </div>

        <div class="info">
            • MAPEAMENTO: <span>iPHONE 14 PRO MODE</span><br>
            • AUXÍLIO: <span>NO TALO (STICKY CAPA)</span><br>
            • SENSIBILIDADE: <span>DINÂMICA ATIVA</span><br>
            • STATUS: <span id="stt">INJETANDO...</span>
        </div>
    </div>

    <script type="module" src="enginebundle.js"></script>

    <script>
        // Animação automática de 0 a 100%
        function start() {
            let count = 0;
            const fill = document.getElementById('fill');
            const pct = document.getElementById('pct');
            const stt = document.getElementById('stt');
            const title = document.getElementById('title');

            const timer = setInterval(() => {
                count += Math.floor(Math.random() * 3) + 1;
                
                if (count >= 100) {
                    count = 100;
                    clearInterval(timer);
                    stt.innerText = "AUXÍLIO ATIVADO";
                    stt.style.color = "#00ff00";
                    title.innerText = "Sistema Ativo";
                }

                fill.style.width = count + "%";
                pct.innerText = count + "%";
            }, 60);
        }

        window.onload = start;
        
        // Registro do Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>

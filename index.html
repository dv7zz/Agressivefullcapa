<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Otimização Elite</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Otimização">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/771/771210.png">

    <style>
        /* RESET E PERFORMANCE IPHONE 14 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        :root {
            --red: #ff0000;
            --bg: #050505;
            --glass: rgba(15, 15, 15, 0.95);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* PAINEL PREMIUM */
        .panel {
            width: 90%;
            max-width: 360px;
            background: var(--glass);
            border: 1px solid rgba(255, 0, 0, 0.4);
            border-radius: 25px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.2);
            position: relative;
        }

        h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            color: #fff;
        }

        /* SISTEMA DE CARGA */
        .loading-container {
            margin-bottom: 30px;
        }

        .percent {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 15px;
            text-shadow: 0 0 20px var(--red);
            font-variant-numeric: tabular-nums;
        }

        .bar-bg {
            width: 100%;
            height: 5px;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #600, var(--red));
            box-shadow: 0 0 15px var(--red);
            transition: width 0.1s linear;
        }

        /* MAPEAMENTO DE FUNÇÕES */
        .features {
            text-align: left;
            font-size: 0.7rem;
            color: #555;
            line-height: 1.8;
            border-top: 1px solid #222;
            padding-top: 20px;
            text-transform: uppercase;
        }

        .features span { color: var(--red); font-weight: bold; }

        #status-msg {
            color: #777;
            font-weight: bold;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="panel">
        <h1 id="main-title">Login do Sistema</h1>
        
        <div class="loading-container">
            <div class="percent" id="pct">0%</div>
            <div class="bar-bg">
                <div class="bar-fill" id="fill"></div>
            </div>
        </div>

        <div class="features">
            • DISPOSITIVO: <span>iPHONE 14 PRO MODE</span><br>
            • AUXÍLIO: <span>NO TALO (STICKY CAPA)</span><br>
            • SENSI: <span>DINÂMICA ATIVA</span><br>
            • STATUS: <span id="status-msg">INJETANDO...</span>
        </div>
    </div>

    <script type="module" src="enginebundle.js"></script>

    <script>
        // REGISTRO AUTOMÁTICO DO SERVICE WORKER
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Engine Ativa"))
            .catch(() => console.log("Erro de Injeção"));
        }

        // LÓGICA DE INJEÇÃO (ANIMAÇÃO)
        function runSystem() {
            let count = 0;
            const fill = document.getElementById('fill');
            const pct = document.getElementById('pct');
            const status = document.getElementById('status-msg');
            const title = document.getElementById('main-title');

            const timer = setInterval(() => {
                // Incremento aleatório para parecer real
                count += Math.floor(Math.random() * 2) + 1;
                
                if (count >= 100) {
                    count = 100;
                    clearInterval(timer);
                    status.innerText = "SISTEMA ATIVO (NO TALO)";
                    status.style.color = "#00ff00";
                    title.innerText = "Otimização Concluída";
                    title.style.color = "#fff";
                }

                fill.style.width = count + "%";
                pct.innerText = count + "%";
            }, 55);
        }

        window.onload = runSystem;
    </script>
</body>
</html>
